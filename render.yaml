services:
  - type: web
    name: v-learn-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: vlearn
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SECRET_KEY
        generateValue: true
